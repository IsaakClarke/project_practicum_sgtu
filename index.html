<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDoc — Магазин автозапчастей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container header-container">
            <div class="logo">Auto<span>Doc</span></div>
            <div class="header-phone">📞 +7 (999) 123-45-67</div>
            <div class="cart-badge" id="open-cart-btn">
                <span>🛒</span>
                <span class="cart-text">Корзина</span>
                <span id="cart-count" class="cart-count">0</span>
            </div>
        </div>
    </header>

    <div class="main-layout container">
        
        <aside class="sidebar-categories">
            <h3>Категории</h3>
            <ul class="categories-list" id="categories-list">
                <li class="loading">Загрузка...</li>
            </ul>
        </aside>

        <main class="catalog-content">
            
            <div class="catalog-header">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Введите название, артикул или OEM номер...">
                    <button id="search-btn">Найти</button>
                </div>
                <h2 id="catalog-title">Все запчасти</h2>
            </div>

            <div class="products-grid" id="products-grid">
                </div>
        </main>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-sidebar-header">
            <h3>Корзина</h3>
            <button id="close-cart-btn" class="close-btn">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <p class="empty-cart-text">В корзине пока ничего нет</p>
        </div>
        <div class="cart-sidebar-footer">
            <div class="total-price">
                <span>Итого:</span>
                <span id="cart-total-amount">0 ₽</span>
            </div>
            <button id="checkout-btn" class="btn-primary" disabled>Оформить заказ</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="payment-modal" id="payment-modal">
        <div class="payment-box">
            <button id="close-payment-btn" class="close-btn">&times;</button>
            <h3>Онлайн-оплата заказа</h3>
            <p class="payment-amount-text">Сумма к оплате: <span id="payment-total">0 ₽</span></p>
            
            <form id="payment-form">
                <div class="form-group">
                    <label for="pay-email">Email для электронного чека</label>
                    <input type="email" id="pay-email" placeholder="example@mail.ru" required>
                </div>

                <div class="card-wrapper">
                    <div class="form-group">
                        <label for="card-number">Номер карты</label>
                        <input type="text" id="card-number" placeholder="2200 4400 5500 6600" maxlength="19" required>
                    </div>
                    
                    <div class="card-row">
                        <div class="form-group">
                            <label for="card-expiry">Срок действия</label>
                            <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" required>
                        </div>
                        <div class="form-group">
                            <label for="card-cvc">CVC/CVV</label>
                            <input type="password" id="card-cvc" placeholder="***" maxlength="3" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 15px;">Оплатить заказ</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
